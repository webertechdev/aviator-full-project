name: Deploy Aviator

on:
push:
branches: [main]

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: "20"

  - name: Install & Build Frontend
    run: |
      cd frontend
      npm install
      npm run build
    env:
      VITE_API_BASE: https://aviator-full-project.vercel.app/api
```
